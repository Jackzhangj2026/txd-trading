name: Daily SEO Blog Generator
on:
  push:
    branches: [main]
  schedule:
    - cron: '0 2 * * *'
  workflow_dispatch:
permissions:
  contents: write
  pages: write
  id-token: write
concurrency:
  group: "pages"
  cancel-in-progress: false
jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Generate daily SEO blog post
        if: github.actor != 'github-actions[bot]'
        run: python3 scripts/generate_blog.py
      - name: Generate sitemap.xml and robots.txt
        if: github.actor != 'github-actions[bot]'
        run: python3 scripts/generate_sitemap.py
      - name: Commit and push
        if: github.actor != 'github-actions[bot]'
        run: |
          git config user.name "TXD CO., LTD Bot"
          git config user.email "4621710@qq.com"
          git add .
          git diff --quiet && git diff --staged --quiet || \
            git commit -m "Auto: Daily SEO blog post $(date +%Y-%m-%d)"
          git push
      - name: Setup Pages
        uses: actions/configure-pages@v5
      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: '.'
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v5
