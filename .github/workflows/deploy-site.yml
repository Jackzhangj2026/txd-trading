name: Daily SEO Blog Generator
on:
  push:
    branches: [main]
  schedule:
    - cron: '0 2 * * *'
  workflow_dispatch:
permissions:
  contents: write
jobs:
  generate-blog:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Generate daily SEO blog post
        run: python3 scripts/generate_blog.py
      - name: Commit and push
        run: |
          git config user.name "TXD CO., LTD Bot"
          git config user.email "4621710@qq.com"
          git add .
          git diff --quiet && git diff --staged --quiet || \
            git commit -m "Auto: Daily SEO blog post $(date +%Y-%m-%d)"
          git push
